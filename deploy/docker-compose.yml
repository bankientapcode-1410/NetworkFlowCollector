services:
  network-flow-collector:
    build:
      context: ..
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-jdbc:clickhouse://clickhouse:8123/default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-kien}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-2606}
      CLICKHOUSE_CLEAN_ON_START: ${CLICKHOUSE_CLEAN_ON_START:-true}
      NFC_KAFKA_ENABLED: ${NFC_KAFKA_ENABLED:-true}
      NFC_KAFKA_BOOTSTRAP_SERVERS: ${NFC_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      NFC_KAFKA_RAW_TOPIC: ${NFC_KAFKA_RAW_TOPIC:-raw-flows}
      NFC_KAFKA_DLQ_TOPIC: ${NFC_KAFKA_DLQ_TOPIC:-dead-letter-flows}
      NFC_KAFKA_PRODUCER_LINGER_MS: ${NFC_KAFKA_PRODUCER_LINGER_MS:-10ms}
      NFC_KAFKA_PRODUCER_BATCH_SIZE_BYTES: ${NFC_KAFKA_PRODUCER_BATCH_SIZE_BYTES:-131072}
      NFC_KAFKA_PRODUCER_MAX_IN_FLIGHT_PUBLISHES: ${NFC_KAFKA_PRODUCER_MAX_IN_FLIGHT_PUBLISHES:-50000}
      NFC_NETFLOW_ENABLED: ${NFC_NETFLOW_ENABLED:-true}
      NFC_NETFLOW_RECEIVE_BUFFER_BYTES: ${NFC_NETFLOW_RECEIVE_BUFFER_BYTES:-8388608}
      NFC_NETFLOW_PACKET_QUEUE_CAPACITY: ${NFC_NETFLOW_PACKET_QUEUE_CAPACITY:-8192}
      NFC_NETFLOW_WORKER_THREADS: ${NFC_NETFLOW_WORKER_THREADS:-4}
      NFC_NETFLOW_PUBLISH_BACKPRESSURE_RETRY_ATTEMPTS: ${NFC_NETFLOW_PUBLISH_BACKPRESSURE_RETRY_ATTEMPTS:-20}
      NFC_NETFLOW_PUBLISH_BACKPRESSURE_RETRY_DELAY_MS: ${NFC_NETFLOW_PUBLISH_BACKPRESSURE_RETRY_DELAY_MS:-5}
      NFC_ZEEK_ENABLED: ${NFC_ZEEK_ENABLED:-true}
      NFC_ZEEK_PATHS: ${NFC_ZEEK_PATHS:-/var/log/zeek/conn.log}
      NFC_ZEEK_START_AT_END: ${NFC_ZEEK_START_AT_END:-true}
      NFC_SURICATA_ENABLED: ${NFC_SURICATA_ENABLED:-true}
      NFC_SURICATA_PATHS: ${NFC_SURICATA_PATHS:-/var/log/suricata/eve.json}
      NFC_SURICATA_START_AT_END: ${NFC_SURICATA_START_AT_END:-true}
      NFC_REST_ENABLED: ${NFC_REST_ENABLED:-true}
      NFC_REST_MAX_BATCH_SIZE: ${NFC_REST_MAX_BATCH_SIZE:-5000}
    ports:
      - "8080:8080"
      - "2055:2055/udp"
    volumes:
      - ${NFC_ZEEK_HOST_LOG:-../conn.log}:/var/log/zeek/conn.log:ro
      - ${NFC_SURICATA_HOST_LOG:-../suricata-eve.json}:/var/log/suricata/eve.json:ro

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
      CLUSTER_ID: MkQkQjQ3NTI0NTI0YjQ3NQ
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NFC_KAFKA_RAW_TOPIC: ${NFC_KAFKA_RAW_TOPIC:-raw-flows}
      NFC_KAFKA_DLQ_TOPIC: ${NFC_KAFKA_DLQ_TOPIC:-dead-letter-flows}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for topic in "$$NFC_KAFKA_RAW_TOPIC" "$$NFC_KAFKA_DLQ_TOPIC"; do
          kafka-topics --bootstrap-server kafka:9092 --delete --if-exists --topic "$$topic" || true
        done
        for topic in "$$NFC_KAFKA_RAW_TOPIC" "$$NFC_KAFKA_DLQ_TOPIC"; do
          attempts=0
          while kafka-topics --bootstrap-server kafka:9092 --describe --topic "$$topic" >/dev/null 2>&1; do
            attempts=$$((attempts + 1))
            if [ "$$attempts" -ge 30 ]; then
              echo "Timed out waiting for Kafka topic deletion: $$topic" >&2
              exit 1
            fi
            sleep 1
          done
        done
        kafka-topics --bootstrap-server kafka:9092 --create --topic "$$NFC_KAFKA_RAW_TOPIC" --partitions 12 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --topic "$$NFC_KAFKA_DLQ_TOPIC" --partitions 3 --replication-factor 1

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-kien}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-2606}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ../src/main/resources/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ch-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$$CLICKHOUSE_USER\" --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  ch-data:
  kafka-data:
