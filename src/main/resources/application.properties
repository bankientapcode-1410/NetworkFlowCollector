spring.application.name=query-api

clickhouse.enabled=${CLICKHOUSE_ENABLED:true}
clickhouse.url=${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/default}
clickhouse.user=${CLICKHOUSE_USER:kien}
clickhouse.password=${CLICKHOUSE_PASSWORD:2606}
clickhouse.clean-on-start=${CLICKHOUSE_CLEAN_ON_START:false}

nfc.kafka.enabled=${NFC_KAFKA_ENABLED:false}
nfc.kafka.bootstrap-servers=${NFC_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
nfc.kafka.raw-topic=${NFC_KAFKA_RAW_TOPIC:raw-flows}
nfc.kafka.dlq-topic=${NFC_KAFKA_DLQ_TOPIC:dead-letter-flows}
nfc.kafka.client-id=${NFC_KAFKA_CLIENT_ID:network-flow-collector}
nfc.kafka.producer.linger-ms=${NFC_KAFKA_PRODUCER_LINGER_MS:10ms}
nfc.kafka.producer.batch-size-bytes=${NFC_KAFKA_PRODUCER_BATCH_SIZE_BYTES:131072}
nfc.kafka.producer.max-in-flight-publishes=${NFC_KAFKA_PRODUCER_MAX_IN_FLIGHT_PUBLISHES:50000}
nfc.kafka.consumer.enabled=${NFC_KAFKA_CONSUMER_ENABLED:true}
nfc.kafka.consumer.group-id=${NFC_KAFKA_CONSUMER_GROUP_ID:flow-normalization-service}
nfc.kafka.consumer.batch-max-records=${NFC_KAFKA_CONSUMER_BATCH_MAX_RECORDS:5000}

# Semicolon-separated entries: cidr,country[,asn[,as_org]]
nfc.enrichment.enabled=${NFC_ENRICHMENT_ENABLED:true}
nfc.enrichment.prefixes=${NFC_ENRICHMENT_PREFIXES:}

nfc.masking.enabled=${NFC_MASKING_ENABLED:false}
nfc.masking.hmac-key=${NFC_MASKING_HMAC_KEY:}
nfc.masking.redact-replacement=${NFC_MASKING_REDACT_REPLACEMENT:[REDACTED]}
# Example:
# nfc.masking.rules[0].field=src_ip
# nfc.masking.rules[0].strategy=PREFIX_TRUNCATE
# nfc.masking.rules[0].ipv4-prefix=24
# nfc.masking.rules[0].ipv6-prefix=48
# nfc.masking.rules[1].field=src_as_org
# nfc.masking.rules[1].strategy=HASH

nfc.collectors.enabled=${NFC_COLLECTORS_ENABLED:true}
# Built-in collectors are opt-in because enabled collectors require a FlowPublisher and file collectors require paths.
nfc.collectors.configs.netflow.enabled=${NFC_NETFLOW_ENABLED:false}
nfc.collectors.configs.netflow.properties.bind_address=${NFC_NETFLOW_BIND_ADDRESS:0.0.0.0}
nfc.collectors.configs.netflow.properties.port=${NFC_NETFLOW_PORT:2055}
nfc.collectors.configs.netflow.properties.receive_buffer_bytes=${NFC_NETFLOW_RECEIVE_BUFFER_BYTES:8388608}
nfc.collectors.configs.netflow.properties.packet_queue_capacity=${NFC_NETFLOW_PACKET_QUEUE_CAPACITY:8192}
nfc.collectors.configs.netflow.properties.worker_threads=${NFC_NETFLOW_WORKER_THREADS:4}
nfc.collectors.configs.netflow.properties.publish_backpressure_retry_attempts=${NFC_NETFLOW_PUBLISH_BACKPRESSURE_RETRY_ATTEMPTS:20}
nfc.collectors.configs.netflow.properties.publish_backpressure_retry_delay_ms=${NFC_NETFLOW_PUBLISH_BACKPRESSURE_RETRY_DELAY_MS:5}
nfc.collectors.configs.zeek.enabled=${NFC_ZEEK_ENABLED:false}
nfc.collectors.configs.zeek.properties.paths=${NFC_ZEEK_PATHS:}
nfc.collectors.configs.zeek.properties.exporter_ip=${NFC_ZEEK_EXPORTER_IP:127.0.0.1}
nfc.collectors.configs.zeek.properties.poll_interval_ms=${NFC_ZEEK_POLL_INTERVAL_MS:1000}
nfc.collectors.configs.zeek.properties.start_at_end=${NFC_ZEEK_START_AT_END:false}
nfc.collectors.configs.suricata.enabled=${NFC_SURICATA_ENABLED:false}
nfc.collectors.configs.suricata.properties.paths=${NFC_SURICATA_PATHS:}
nfc.collectors.configs.suricata.properties.exporter_ip=${NFC_SURICATA_EXPORTER_IP:127.0.0.1}
nfc.collectors.configs.suricata.properties.poll_interval_ms=${NFC_SURICATA_POLL_INTERVAL_MS:1000}
nfc.collectors.configs.suricata.properties.start_at_end=${NFC_SURICATA_START_AT_END:false}
nfc.collectors.configs.rest.enabled=${NFC_REST_ENABLED:false}
nfc.collectors.configs.rest.properties.max_batch_size=${NFC_REST_MAX_BATCH_SIZE:5000}
